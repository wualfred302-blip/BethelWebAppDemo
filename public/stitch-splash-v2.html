<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Bethel - General Insurance &amp; Surety Corporation</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>

                        "on-secondary-fixed": "#00174b",
                        "surface-container-low": "#f6f3f2",
                        "surface-container-high": "#ebe7e7",
                        "error": "#ba1a1a",
                        "on-secondary-container": "#394c84",
                        "on-primary-container": "#eeefff",
                        "on-secondary": "#ffffff",
                        "surface-bright": "#fcf9f8",

                        "on-primary": "#ffffff",
                        "on-primary-fixed-variant": "#003ea8",
                        "tertiary-fixed": "#ffdbcd",
                        "surface-container-highest": "#e5e2e1",
                        "on-background": "#111111",

                        "tertiary-container": "#bc4800",
                        "secondary-container": "#acbfff",
                        "surface-container-lowest": "#ffffff",
                        "primary-fixed": "#dbe1ff",
                        "inverse-on-surface": "#f3f0ef",

                        "tertiary": "#943700",

                        "on-tertiary-fixed": "#360f00",
                        "on-error": "#ffffff",
                        "secondary-fixed": "#dbe1ff",

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #ffffff;
            color: #111111;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface overflow-hidden">
<!-- Top 60% Content Area -->
<main class="flex-grow flex flex-col items-center justify-center text-center px-6" style="height: 60vh;">
<!-- Minimalist Shield Icon -->
<div class="mb-8 relative flex items-center justify-center">
<div class="w-24 h-24 border-2 border-primary rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-5xl" data-icon="shield">shield</span>
</div>
</div>
<!-- Brand Identity -->
<h1 class="text-[28px] font-bold tracking-[-0.04em] text-on-surface mb-4">Bethel</h1>
<!-- Centered Rule -->
<div class="w-10 h-[1px] bg-[#E5E7EB] mb-4 mx-auto"></div>
<!-- Corporation Name -->
<p class="text-[11px] font-medium tracking-[0.1em] uppercase text-[#9CA3AF] mb-12">
            General Insurance &amp; Surety Corporation
        </p>
<!-- CTA Text -->
<div class="space-y-1">
<p class="text-[14px] text-[#374151]">Get your CGL coverage</p>
<p class="text-[14px] font-semibold text-on-surface">in 3 minutes.</p>
</div>
</main>
<!-- Bottom 20% Action Area -->
<footer class="mt-auto px-6 pb-10 flex flex-col items-center justify-end" style="height: 20vh;">
<!-- Get Started Button -->
<button class="w-full h-[52px] bg-primary text-on-primary rounded-lg font-semibold text-base transition-all active:scale-[0.98] mb-[20px]">
            Get Started
        </button>
<!-- Shared Component: Footer (Modified for Brand Identity) -->
<div class="flex flex-col items-center justify-center w-full py-2 gap-2">
<p class="text-[10px] tracking-widest uppercase text-[#c0c0c0] font-medium text-center">
                Bethel General Insurance &amp; Surety Corp. — Est. 1961
            </p>
<div class="flex gap-4 items-center">
<a class="font-inter text-[10px] tracking-widest uppercase text-[#c0c0c0] hover:text-primary transition-colors duration-200 opacity-80 hover:opacity-100" href="#">Privacy Policy</a>
<span class="w-1 h-1 bg-[#c0c0c0] rounded-full"></span>
<a class="font-inter text-[10px] tracking-widest uppercase text-[#c0c0c0] hover:text-primary transition-colors duration-200 opacity-80 hover:opacity-100" href="#">Terms of Service</a>
</div>
</div>
</footer>
<!-- Decorative Subtle Background Detail (Image replacement with Gradient as per rules) -->
<div class="fixed inset-0 pointer-events-none opacity-5 z-[-1]" style="background-image: radial-gradient(circle at 50% -20%, #2563EB 0%, transparent 40%);">
</div>
</body></html>
